[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cascade-img"
version = "0.1.0a1"
description = "LLM-operable image-generation pipeline. Midjourney via Discord at v0.1, pluggable backends after."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [
    { name = "Green Rose Systems", email = "info@greenrosesystems.com" }
]
keywords = ["midjourney", "image-generation", "mcp", "agent", "llm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "discord.py-self>=2.0.0",
    "flask>=2.3.0",
    "requests>=2.31.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "ruff>=0.4.0",
]

[project.scripts]
cascade-mj-bridge = "cascade_img.backends.midjourney_discord.bridge:main"

[project.urls]
Homepage = "https://greenrosesystems.com"
Repository = "https://github.com/greenrosesystems/cascade-img"

[tool.hatch.build.targets.wheel]
packages = ["src/cascade_img"]

[tool.hatch.build.targets.wheel.force-include]
"src/cascade_img/signals/versions/0.1.json" = "cascade_img/signals/versions/0.1.json"
