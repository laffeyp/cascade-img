[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cascade-img"
version = "0.1.0"
description = "LLM-operable image-generation pipeline. Midjourney via Discord at v0.1, pluggable backends after."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.14"
authors = [
    { name = "Peter Laffey" },
]
maintainers = [
    { name = "Peter Laffey" },
]
keywords = [
    "midjourney",
    "image-generation",
    "mcp",
    "model-context-protocol",
    "agent",
    "llm",
    "claude",
    "cursor",
    "cline",
    "discord",
    "sprite-art",
    "v7",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: MacOS",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: Implementation :: CPython",
    "Topic :: Multimedia :: Graphics",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "discord.py-self>=2.0.0",
    "flask>=2.3.0",
    "requests>=2.31.0",
    "python-dotenv>=1.0.0",
    "Pillow>=10.0.0",
    "mcp>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "ruff>=0.4.0",
    "mypy>=1.8",
]
ml = [
    # Optional ML curation. rembg (background removal) pulls onnxruntime (~150 MB).
    "rembg>=2.0",
]

[project.scripts]
cascade-mj-bridge = "cascade_img.backends.midjourney_discord.bridge:main"
cascade-mcp = "cascade_img.interfaces.mcp.tool_server:main"
cascade-mj = "cascade_img.interfaces.cli.generate_image:main"
cascade-trace-check = "cascade_img.vocabulary.trace_check:main"

[project.urls]
Homepage = "https://github.com/laffeyp/cascade-img"
Repository = "https://github.com/laffeyp/cascade-img"
Documentation = "https://github.com/laffeyp/cascade-img#readme"
Changelog = "https://github.com/laffeyp/cascade-img/blob/main/CHANGELOG.md"
Issues = "https://github.com/laffeyp/cascade-img/issues"

# ---------------------------------------------------------------------------
# Build (Hatchling)
# ---------------------------------------------------------------------------

[tool.hatch.build.targets.wheel]
packages = ["src/cascade_img"]

[tool.hatch.build.targets.wheel.force-include]
"src/cascade_img/vocabulary/versions/0.1.json" = "cascade_img/vocabulary/versions/0.1.json"
"src/cascade_img/py.typed" = "cascade_img/py.typed"
"src/cascade_img/.env.example" = "cascade_img/.env.example"

[tool.hatch.build.targets.sdist]
include = [
    "src/",
    "tests/",
    "tools/",
    "README.md",
    "LICENSE",
    "CHANGELOG.md",
    # Agent entry docs, mirrored from the repo root by
    # tools/render_agent_entrypoints.py so the source dist is agent-navigable.
    "AGENTS.md",
    "CLAUDE.md",
    "GEMINI.md",
    ".windsurfrules",
    ".clinerules",
]

# ---------------------------------------------------------------------------
# pytest
# ---------------------------------------------------------------------------

[tool.pytest.ini_options]
minversion = "7.0"
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
]
markers = [
    "unit: fast, in-process; no network, subprocess, or real Discord. The default tier.",
    "integration: crosses an in-process boundary (Flask test_client, MCP dispatch) but stays hermetic — no live external service.",
    "contract: cross-artifact consistency gate (emit callsites vs vocabulary; root mirror vs package data). Fast; runs with unit.",
    "smoke: fast happy-path slice of the live walk; needs a real .env. Skipped unless CASCADE_LIVE=1.",
    "e2e: full live walk over the real MCP stdio transport + real Discord/Midjourney. Slow, costs credits. Skipped unless CASCADE_LIVE=1.",
]
filterwarnings = [
    "error",
    # PyNaCl voice-support warning fires unconditionally inside discord.py-self.
    "ignore::UserWarning:discord",
    # mcp's pydantic schema emits a deprecation warning we can't fix downstream.
    "ignore::DeprecationWarning:mcp",
    "ignore::DeprecationWarning:pydantic",
    # discord.py-self's @client.event decorator calls asyncio.iscoroutinefunction
    # (client.py:1796), which Python 3.14 deprecates (removal slated 3.16). It
    # fires at import time, so without this the suite fails to collect. This is
    # purely third-party: our own code uses inspect.iscoroutinefunction. matched
    # by message because pytest attributes the warning to the asyncio frame, not
    # the discord package. Drop when discord.py-self migrates upstream.
    "ignore:'asyncio.iscoroutinefunction' is deprecated:DeprecationWarning",
]

# ---------------------------------------------------------------------------
# Coverage
# ---------------------------------------------------------------------------

[tool.coverage.run]
source = ["cascade_img"]
branch = true
omit = [
    "src/cascade_img/_source/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
show_missing = true
precision = 1

# ---------------------------------------------------------------------------
# Ruff (lint + format)
# ---------------------------------------------------------------------------

[tool.ruff]
line-length = 100
target-version = "py314"
extend-exclude = ["_source", "build", "dist"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
]
ignore = [
    "E501",  # line too long — formatter handles wrap; long URLs / docstrings exempted
    "B008",  # function call in default argument (Pillow / requests idioms)
    "SIM108", # ternary readability is judgment, not a lint
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B011"]  # assert False in tests is sometimes intentional

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ---------------------------------------------------------------------------
# mypy
# ---------------------------------------------------------------------------

[tool.mypy]
python_version = "3.14"
strict = false
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = false
check_untyped_defs = true
disallow_untyped_decorators = false
ignore_missing_imports = true
files = ["src/cascade_img"]

[[tool.mypy.overrides]]
module = ["discord.*", "mcp.*", "PIL.*"]
ignore_missing_imports = true
