name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    name: Build + publish to PyPI
    runs-on: ubuntu-latest

    # PyPI Trusted Publishing — configure the project at pypi.org with this
    # repo + workflow as a trusted publisher. No long-lived token in secrets.
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: packages/engine

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Smoke install the built wheel
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/cascade_img-*.whl
          /tmp/smoke/bin/python -c "import cascade_img; print(cascade_img.__version__)"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/engine/dist/

  github-release:
    name: GitHub Release with changelog
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Cut release with CHANGELOG section
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.ver.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, 'a') || contains(steps.ver.outputs.version, 'b') || contains(steps.ver.outputs.version, 'rc') }}
