name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest + parity (Python 3.14)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: packages/python/pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel
        run: python -m build --wheel

      - name: Install package + dev extras
        run: |
          WHL=$(ls dist/cascade_img-*.whl | head -1)
          pip install "${WHL}[dev]"

      - name: Vocabulary parity (every emit tag in vocabulary)
        run: python3 tools/check_vocabulary_parity.py

      - name: Vocabulary reference up to date
        run: python3 tools/render_vocabulary_reference.py --check

      - name: mypy
        run: mypy src/cascade_img

      - name: pytest
        run: pytest tests/ -v

  lint:
    name: ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - run: pip install ruff
      - run: ruff check src/ tests/ tools/
      - run: ruff format --check src/ tests/ tools/
